<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1-128スキャンテスト</title>
<style>
  body{font-family:sans-serif;padding:16px;background:#f5f4f0;max-width:600px;margin:0 auto}
  h2{font-size:16px;margin-bottom:12px;color:#2d5a3d}
  #reader{width:100%;border-radius:10px;overflow:hidden;margin-bottom:14px}
  .card{background:#fff;border-radius:10px;border:1px solid #e2e0d8;padding:16px;margin-bottom:12px}
  .label{font-size:10px;color:#9e9b93;text-transform:uppercase;letter-spacing:0.05em}
  .val{font-size:18px;font-weight:700;font-family:monospace;margin-top:2px}
  .val.ok{color:#2d5a3d}.val.danger{color:#c0392b}.val.warn{color:#b7621a}
  .raw{font-size:11px;font-family:monospace;color:#9e9b93;word-break:break-all;margin-top:8px;padding:8px;background:#f0efe9;border-radius:6px}
  .status{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:10px}
  .status.scanning{background:#e8f2eb;color:#2d5a3d}
  .status.error{background:#fdf0ee;color:#c0392b}
  button{padding:10px 20px;background:#2d5a3d;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;width:100%;margin-bottom:8px}
  button.stop{background:#c0392b}
  #log{font-size:11px;font-family:monospace;color:#6b6860;max-height:120px;overflow-y:auto;padding:8px;background:#f0efe9;border-radius:6px}
</style>
</head>
<body>

<h2>📷 GS1-128スキャンテスト</h2>

<div id="reader"></div>
<div class="status scanning" id="status">スタートボタンを押してください</div>
<button id="startBtn" onclick="startScan()">スキャン開始</button>
<button id="stopBtn" class="stop" onclick="stopScan()" style="display:none">停止</button>

<div class="card" id="resultCard" style="display:none">
  <div class="label">品目コード（GTIN）</div>
  <div class="val" id="rGtin">—</div>

  <div class="label" style="margin-top:12px">有効期限</div>
  <div class="val" id="rExp">—</div>

  <div class="label" style="margin-top:12px">ロット番号</div>
  <div class="val" id="rLot">—</div>

  <div class="label" style="margin-top:12px">在庫数量（手入力）</div>
  <input type="number" id="rQty" style="width:100%;padding:8px;font-size:16px;border:1px solid #ccc;border-radius:6px;margin-top:4px" placeholder="錠数を入力">

  <button onclick="addToList()" style="margin-top:12px;background:#1a4a8a">チェックリストに追加</button>
  <div class="raw" id="rRaw"></div>
</div>

<div class="card" id="listCard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <strong style="font-size:13px">在庫チェックリスト</strong>
    <button onclick="exportCSV()" style="width:auto;padding:6px 12px;font-size:12px">CSVで保存</button>
  </div>
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#f0efe9">
      <th style="padding:6px 8px;text-align:left;border-bottom:1px solid #e2e0d8">GTIN</th>
      <th style="padding:6px 8px;text-align:left;border-bottom:1px solid #e2e0d8">有効期限</th>
      <th style="padding:6px 8px;text-align:left;border-bottom:1px solid #e2e0d8">ロット</th>
      <th style="padding:6px 8px;text-align:right;border-bottom:1px solid #e2e0d8">数量</th>
    </tr></thead>
    <tbody id="listBody"></tbody>
  </table>
</div>

<div class="card">
  <div style="font-size:12px;font-weight:700;margin-bottom:6px">デバッグログ</div>
  <div id="log">ここにスキャン生データが表示されます</div>
</div>

<!-- html5-qrcode ライブラリ（完全無料・CDN） -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>

// =============================================
// GS1-128 解析ロジック
// =============================================
function parseGS1_128(rawValue) {
  const result = {
    gtin: null,
    expiry: null,
    expiryDate: null,
    lot: null,
    qty: null,
    raw: rawValue
  };

  // FNC1文字の正規化（各種エンコード形式に対応）
  // html5-qrcodeはFNC1を \u001d または空文字として返すことがある
  let s = rawValue
    .replace(/\u001d/g, String.fromCharCode(0x1D))  // GS文字
    .replace(/\u001e/g, String.fromCharCode(0x1D))  // RS文字
    .replace(/\u00e8/g, String.fromCharCode(0x1D)); // 別エンコード

  // ① カッコ付きフォーマット対応: (AI)value
  //    Google Lensなどがこの形式で返す
  if (s.includes('(')) {
    const matches = [...s.matchAll(/\((\d{2,4})\)([^\(]*)/g)];
    for (const m of matches) {
      parseAI(result, m[1], m[2].trim());
    }
    return result;
  }

  // ② 生のGS1-128（FNC1区切り）
  // 先頭がFNC1の場合はGS1-128として解析
  let pos = 0;
  if (s.charCodeAt(0) === 0x1D) pos = 1; // 先頭FNC1をスキップ

  while (pos < s.length) {
    // AIを2〜4桁で試みる
    let ai = null, val = null;

    // 固定長AIを先に試みる
    const ai2 = s.slice(pos, pos + 2);
    const ai3 = s.slice(pos, pos + 3);
    const ai4 = s.slice(pos, pos + 4);

    if (['01','02','10','11','13','15','16','17','20'].includes(ai2)) {
      ai = ai2;
    } else if (['240','241','250','251','253','254','255','310','311','312',
                '313','314','315','316','320','321','322','323','324','325',
                '326','327','328','329','330','331','332','333','334','335',
                '336','337','340','341','342','343','344','345','346','347',
                '348','349','390','391','392','393'].includes(ai3)) {
      ai = ai3;
    } else if (/^[0-9]{4}$/.test(ai4) && parseInt(ai4) >= 3100) {
      ai = ai4;
    } else {
      ai = ai2; // デフォルト
    }

    pos += ai.length;

    // AI別の固定長・可変長を処理
    const fixedLen = getAIFixedLength(ai);
    if (fixedLen > 0) {
      val = s.slice(pos, pos + fixedLen);
      pos += fixedLen;
    } else {
      // 可変長：次のFNC1（GS）まで
      const gsPos = s.indexOf(String.fromCharCode(0x1D), pos);
      if (gsPos === -1) {
        val = s.slice(pos);
        pos = s.length;
      } else {
        val = s.slice(pos, gsPos);
        pos = gsPos + 1;
      }
    }

    parseAI(result, ai, val);
  }

  return result;
}

// AI別の固定長テーブル（主要なもの）
function getAIFixedLength(ai) {
  const fixed = {
    '00': 18, '01': 14, '02': 14,
    '11': 6,  '12': 6,  '13': 6,  '14': 6,
    '15': 6,  '16': 6,  '17': 6,
    '20': 2,
    '31': 10, '32': 10, '33': 10, '34': 10,
    '35': 10, '36': 10,
    '41': 14,
  };
  // 3〜4桁AIの固定長
  if (ai.startsWith('31') || ai.startsWith('32') ||
      ai.startsWith('33') || ai.startsWith('34') ||
      ai.startsWith('35') || ai.startsWith('36')) return 10;
  return fixed[ai] || -1; // -1 = 可変長
}

// AI別のデータ格納
function parseAI(result, ai, val) {
  switch(ai) {
    case '01': // GTIN-14
      result.gtin = val.replace(/\D/g, '').padStart(14, '0');
      break;
    case '17': // 有効期限 YYMMDD
      if (val.length >= 6) {
        const yy = parseInt(val.slice(0, 2));
        const mm = parseInt(val.slice(2, 4));
        const dd = parseInt(val.slice(4, 6));
        const yyyy = yy + (yy < 50 ? 2000 : 1900);
        // dd=00は月末
        const day = dd === 0
          ? new Date(yyyy, mm, 0).getDate()
          : dd;
        result.expiryDate = new Date(yyyy, mm - 1, day);
        result.expiry = `${yyyy}/${String(mm).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
      }
      break;
    case '10': // ロット番号（可変長）
      result.lot = val;
      break;
    case '30': // 数量（可変長）
    case '37':
      result.qty = parseInt(val);
      break;
    case '21': // シリアル番号
      result.serial = val;
      break;
  }
}

// 有効期限の状態判定
function getExpiryStatus(expiryDate) {
  if (!expiryDate) return { cls: '', label: '期限情報なし' };
  const today = new Date();
  const diff = (expiryDate - today) / (1000 * 60 * 60 * 24);
  if (diff < 0) return { cls: 'danger', label: `期限切れ（${Math.abs(Math.floor(diff))}日経過）` };
  if (diff <= 90) return { cls: 'danger', label: `残り${Math.floor(diff)}日 ⚠️` };
  if (diff <= 365) return { cls: 'warn', label: `残り約${Math.floor(diff / 30)}ヶ月` };
  return { cls: 'ok', label: `残り約${Math.floor(diff / 365)}年${Math.floor((diff % 365) / 30)}ヶ月` };
}

// =============================================
// スキャン制御
// =============================================
let html5QrCode = null;
let checklist = [];
let lastScanned = '';
let lastTime = 0;

async function startScan() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('status').textContent = '📷 カメラ起動中...';

  html5QrCode = new Html5Qrcode('reader');

  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      {
        fps: 10,
        qrbox: { width: 280, height: 80 }, // バーコード用の横長枠
        aspectRatio: 1.7,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.DATA_MATRIX,
          Html5QrcodeSupportedFormats.PDF_417,
        ]
      },
      onScanSuccess,
      onScanFailure
    );
    document.getElementById('status').textContent = '📷 スキャン中… バーコードを枠内に合わせてください';
    document.getElementById('status').className = 'status scanning';
  } catch (err) {
    document.getElementById('status').textContent = `❌ カメラエラー：${err}`;
    document.getElementById('status').className = 'status error';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
  }
}

async function stopScan() {
  if (html5QrCode) {
    await html5QrCode.stop();
    html5QrCode = null;
  }
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('status').textContent = 'スキャンを停止しました';
}

function onScanSuccess(rawValue, result) {
  const now = Date.now();
  if (rawValue === lastScanned && now - lastTime < 3000) return;
  lastScanned = rawValue;
  lastTime = now;

  // ログ出力
  addLog(`✅ 読取: ${rawValue.replace(/\u001d/g, '[GS]')}`);

  // GS1-128解析
  const parsed = parseGS1_128(rawValue);
  const expStatus = getExpiryStatus(parsed.expiryDate);

  // 結果表示
  document.getElementById('rGtin').textContent = parsed.gtin || '（読取不可）';
  document.getElementById('rGtin').className = 'val';

  document.getElementById('rExp').textContent = parsed.expiry || '（情報なし）';
  document.getElementById('rExp').className = `val ${expStatus.cls}`;

  document.getElementById('rLot').textContent = parsed.lot || '（情報なし）';
  document.getElementById('rLot').className = 'val';

  document.getElementById('rRaw').textContent =
    `RAW: ${rawValue.replace(/\u001d/g, '[GS]')}\n状態: ${expStatus.label}`;

  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('rQty').value = '';
  document.getElementById('rQty').focus();
}

function onScanFailure(error) {
  // 読み取り失敗は頻繁に起きるので静かに処理
}

function addLog(msg) {
  const log = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  log.textContent = `[${time}] ${msg}\n` + log.textContent;
}

// =============================================
// チェックリスト
// =============================================
function addToList() {
  const gtin = document.getElementById('rGtin').textContent;
  const exp = document.getElementById('rExp').textContent;
  const lot = document.getElementById('rLot').textContent;
  const qty = document.getElementById('rQty').value;
  const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

  checklist.push({ gtin, exp, lot, qty: qty || '未入力', time });

  const tbody = document.getElementById('listBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="padding:6px 8px;border-bottom:1px solid #e2e0d8;font-family:monospace;font-size:11px">${gtin}</td>
    <td style="padding:6px 8px;border-bottom:1px solid #e2e0d8;font-family:monospace">${exp}</td>
    <td style="padding:6px 8px;border-bottom:1px solid #e2e0d8;font-family:monospace">${lot}</td>
    <td style="padding:6px 8px;border-bottom:1px solid #e2e0d8;text-align:right;font-weight:700">${qty||'—'}</td>
  `;
  tbody.appendChild(tr);
  document.getElementById('listCard').style.display = 'block';
  addLog(`📋 リストに追加: GTIN=${gtin}, 期限=${exp}, 数量=${qty}`);
}

function exportCSV() {
  if (!checklist.length) return;
  const header = 'GTIN,有効期限,ロット番号,数量,記録時刻\n';
  const rows = checklist.map(r =>
    `"${r.gtin}","${r.exp}","${r.lot}","${r.qty}","${r.time}"`
  ).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `在庫チェック_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
