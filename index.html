<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スキャンテスト v3</title>
<style>
  body { font-family: sans-serif; padding: 16px; background: #111; color: #eee; max-width: 500px; margin: 0 auto; }
  h2 { color: #4ade80; margin-bottom: 12px; }
  #video { width: 100%; border-radius: 8px; display: block; background: #000; }
  button { width: 100%; padding: 14px; margin: 8px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-family: sans-serif; }
  #startBtn { background: #16a34a; color: white; }
  #stopBtn  { background: #dc2626; color: white; display: none; }
  #result { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin: 8px 0; min-height: 60px; font-family: monospace; font-size: 12px; word-break: break-all; }
  #log { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #4ade80; white-space: pre-wrap; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #60a5fa; }
</style>
</head>
<body>
<h2>📷 バーコードスキャン v3</h2>
<video id="video" autoplay muted playsinline webkit-playsinline></video>
<button id="startBtn" onclick="start()">▶ スキャン開始</button>
<button id="stopBtn"  onclick="stop()">■ 停止</button>
<div id="result">読み取り結果がここに表示されます</div>
<div id="log">ログ待機中...</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
let reader = null;

function log(msg, cls='info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP');
  el.innerHTML = `<span class="${cls}">[${t}] ${msg}</span>\n` + el.innerHTML;
}

async function start() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  log('ZXing初期化中...');

  try {
    // ★ フォーマット指定なし → 全形式自動検出
    reader = new ZXing.BrowserMultiFormatReader();
    log('ZXing初期化完了', 'ok');

    log('カメラ起動中...');

    await reader.decodeFromConstraints(
      {
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1280 },
          height: { ideal: 720 },
        }
      },
      document.getElementById('video'),
      (result, err) => {
        if (result) {
          const raw = result.getText();
          const fmt = result.getBarcodeFormat();
          log(`✅ 読取: [${fmt}] ${raw.replace(/\u001d/g,'[GS]')}`, 'ok');
          document.getElementById('result').innerHTML =
            `<span style="color:#4ade80;font-size:14px;font-weight:bold">✅ 読み取り成功!</span><br>` +
            `形式: ${fmt}<br>` +
            `RAW: ${raw.replace(/\u001d/g,'[GS]')}`;
        }
        if (err && !(err instanceof ZXing.NotFoundException)) {
          log('⚠ ' + err.message, 'err');
        }
      }
    );

    log('カメラ起動完了 - バーコードをかざしてください', 'ok');

  } catch(e) {
    log('❌ エラー: ' + e.message, 'err');
    document.getElementById('result').textContent = 'エラー: ' + e.message;
    stop();
  }
}

function stop() {
  if (reader) { reader.reset(); reader = null; }
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  log('停止しました');
}
</script>
</body>
</html>
