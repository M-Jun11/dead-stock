<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1データバースタック v5</title>
<style>
  body{font-family:sans-serif;padding:12px;background:#0f172a;color:#e2e8f0;max-width:500px;margin:0 auto}
  h2{color:#4ade80;margin-bottom:4px;font-size:16px}
  p{font-size:11px;color:#64748b;margin-bottom:8px}
  #videoWrap{position:relative;background:#000;border-radius:10px;overflow:hidden;margin-bottom:8px}
  #video{width:100%;display:block;max-height:300px;object-fit:cover}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .guide{width:88%;height:90px;border:2.5px solid #4ade80;border-radius:4px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative}
  .guide-label{position:absolute;bottom:-22px;left:0;right:0;text-align:center;color:#4ade80;font-size:11px}
  .line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f87171,transparent);animation:scan 2s ease-in-out infinite}
  @keyframes scan{0%,100%{top:5%}50%{top:88%}}
  button{width:100%;padding:13px;margin:4px 0;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:sans-serif;font-weight:bold}
  #startBtn{background:#16a34a;color:#fff}
  #stopBtn{background:#dc2626;color:#fff;display:none}
  .result-box{background:#1e293b;border-radius:8px;padding:14px;margin:8px 0;font-size:13px;word-break:break-all;min-height:60px}
  .result-box.success{border:2px solid #4ade80}
  .result-box.waiting{border:1px solid #334155;color:#64748b}
  #log{background:#020617;border-radius:8px;padding:10px;height:160px;overflow-y:auto;font-family:monospace;font-size:11px;color:#94a3b8;white-space:pre-wrap;word-break:break-all;margin-top:8px}
  .ok{color:#4ade80}.err{color:#f87171}.info{color:#60a5fa}.warn{color:#fbbf24}
  .hint-box{background:#1e293b;border-radius:8px;padding:12px;margin:8px 0;font-size:12px;color:#94a3b8;line-height:1.8}
  .hint-box strong{color:#e2e8f0}
</style>
</head>
<body>

<h2>📷 GS1データバースタック v5</h2>
<p>2段バーコード（GS1データバースタック）専用</p>

<div id="videoWrap">
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <div id="overlay" style="display:none">
    <div class="guide">
      <div class="line"></div>
      <div class="guide-label">2段バーコードをここに合わせてください</div>
    </div>
  </div>
</div>

<button id="startBtn" onclick="start()">▶ スキャン開始</button>
<button id="stopBtn" onclick="stop()">■ 停止</button>

<div class="hint-box" id="hintBox">
  <strong>📌 読み取りのコツ（2段バーコード）</strong><br>
  ・ バーコードを<strong>横向き</strong>に枠内へ<br>
  ・ 距離：<strong>8〜20cm</strong>でゆっくり動かす<br>
  ・ 蛍光灯など<strong>明るい場所</strong>で試す<br>
  ・ <strong>手ブレなし</strong>でゆっくり静止する
</div>

<div class="result-box waiting" id="result">スキャン結果がここに表示されます</div>

<div style="font-size:11px;color:#64748b;margin-top:6px">デバッグログ</div>
<div id="log">待機中...</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
let reader = null;

function log(msg, cls='info'){
  const el=document.getElementById('log');
  const t=new Date().toLocaleTimeString('ja-JP');
  el.innerHTML=`<span class="${cls}">[${t}] ${msg}</span>\n`+el.innerHTML;
}

// GS1解析
function parseGS1(raw){
  const r={gtin:null,expiry:null,lot:null,raw};
  const GS='\u001d';
  if(raw.includes('(')){
    for(const m of raw.matchAll(/\((\d{2,4})\)([^\(]*)/g)) applyAI(r,m[1],m[2].trim());
    return r;
  }
  let s=raw.replace(/[\u001e\u00e8]/g,GS);
  if(s.charCodeAt(0)===0x1D) s=s.slice(1);
  let pos=0,g=0;
  while(pos<s.length&&g++<20){
    const a2=s.slice(pos,pos+2),a3=s.slice(pos,pos+3),a4=s.slice(pos,pos+4);
    let ai=a2;
    if(/^31[0-9]$/.test(a3)||/^32[0-9]$/.test(a3)) ai=a3;
    if(/^310[0-9]$/.test(a4)) ai=a4;
    pos+=ai.length;
    const fl={'00':18,'01':14,'02':14,'11':6,'12':6,'13':6,'14':6,'15':6,'16':6,'17':6,'18':6,'19':6,'20':2}[ai]??-1;
    let val;
    if(fl>0){val=s.slice(pos,pos+fl);pos+=fl;}
    else{const gi=s.indexOf(GS,pos);if(gi===-1){val=s.slice(pos);pos=s.length;}else{val=s.slice(pos,gi);pos=gi+1;}}
    applyAI(r,ai,val);
  }
  return r;
}
function applyAI(r,ai,val){
  if(ai==='01') r.gtin=val.replace(/\D/g,'');
  if(ai==='17'&&val.length>=6){
    const yy=parseInt(val.slice(0,2)),mm=parseInt(val.slice(2,4)),dd=parseInt(val.slice(4,6));
    const yyyy=yy+(yy<50?2000:1900);
    const day=dd===0?new Date(yyyy,mm,0).getDate():dd;
    r.expiry=`${yyyy}/${String(mm).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
  }
  if(ai==='10') r.lot=val;
}

async function start(){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('overlay').style.display='flex';
  document.getElementById('hintBox').style.display='none';
  log('ZXing初期化中...');

  // ★ GS1データバースタック専用ヒント
  const hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
    ZXing.BarcodeFormat.RSS_EXPANDED_STACKED,  // GS1データバー２層型 ★最優先
    ZXing.BarcodeFormat.RSS_EXPANDED,           // GS1データバー拡張
    ZXing.BarcodeFormat.RSS_14_STACK,           // GS1データバースタック全方向
    ZXing.BarcodeFormat.RSS_14_STACK_OMNIDIRECTIONAL,
    ZXing.BarcodeFormat.CODE_128,               // GS1-128（1段）
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.DATA_MATRIX,
  ]);
  hints.set(ZXing.DecodeHintType.ASSUME_GS1, true);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  // 純粋な1Dバーコードも試みる
  hints.set(ZXing.DecodeHintType.PURE_BARCODE, false);

  reader=new ZXing.BrowserMultiFormatReader(hints,{
    delayBetweenScanAttempts: 80,   // 高頻度スキャン
    delayBetweenScanSuccess: 3000,
  });

  log('ZXing初期化完了','ok');
  log('カメラ起動中（高解像度）...');

  try{
    // ★ 高解像度・オートフォーカス強制
    await reader.decodeFromConstraints(
      {
        video:{
          facingMode:{exact:'environment'}, // 背面カメラ強制
          width:{min:1280,ideal:1920,max:3840},
          height:{min:720,ideal:1080,max:2160},
          focusMode:{ideal:'continuous'},
          exposureMode:{ideal:'continuous'},
          whiteBalanceMode:{ideal:'continuous'},
          zoom:{ideal:1.0}, // ズームなし（歪み防止）
        }
      },
      document.getElementById('video'),
      (result,err)=>{
        if(result){
          const raw=result.getText();
          const fmt=result.getBarcodeFormat().toString();
          const disp=raw.replace(/\u001d/g,'[GS]');
          log(`✅ 読取成功!\n   形式: ${fmt}\n   RAW: ${disp}`,'ok');

          const p=parseGS1(raw);
          const today=new Date();
          let expColor='#94a3b8', expLabel='';
          if(p.expiry){
            const expDate=new Date(p.expiry.replace(/\//g,'-'));
            const diff=(expDate-today)/86400000;
            if(diff<0){expColor='#f87171';expLabel=` ⚠️ 期限切れ(${Math.abs(Math.floor(diff))}日経過)`;}
            else if(diff<=90){expColor='#f87171';expLabel=` ⚠️ 残り${Math.floor(diff)}日`;}
            else if(diff<=365){expColor='#fbbf24';expLabel=` 残り約${Math.floor(diff/30)}ヶ月`;}
            else{expColor='#4ade80';expLabel=` 残り約${Math.floor(diff/365)}年`;}
          }

          const el=document.getElementById('result');
          el.className='result-box success';
          el.innerHTML=
            `<div style="color:#4ade80;font-size:15px;font-weight:bold;margin-bottom:8px">✅ 読み取り成功！</div>`+
            `<div style="margin-bottom:4px"><span style="color:#64748b;font-size:11px">形式：</span>${fmt}</div>`+
            `<div style="margin-bottom:4px"><span style="color:#64748b;font-size:11px">GTIN：</span><span style="font-family:monospace">${p.gtin||'—'}</span></div>`+
            `<div style="margin-bottom:4px"><span style="color:#64748b;font-size:11px">有効期限：</span><span style="font-family:monospace;color:${expColor}">${p.expiry||'—'}${expLabel}</span></div>`+
            `<div style="margin-bottom:8px"><span style="color:#64748b;font-size:11px">ロット：</span><span style="font-family:monospace">${p.lot||'—'}</span></div>`+
            `<div style="font-size:10px;color:#475569;word-break:break-all">RAW: ${disp}</div>`;
        }
        if(err&&!(err instanceof ZXing.NotFoundException)){
          log('⚠ '+err.message,'err');
        }
      }
    );
    log('カメラ起動完了 ✅','ok');
    log('バーコードを枠内に横向きでゆっくりかざしてください','info');
    log('距離の目安：8〜20cm','warn');
  }catch(e){
    // 背面カメラ強制が失敗した場合はフォールバック
    log('背面カメラ強制失敗、フォールバック中... '+e.message,'warn');
    try{
      await reader.decodeFromConstraints(
        {video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}},
        document.getElementById('video'),
        (result,err)=>{
          if(result) onResult(result);
          if(err&&!(err instanceof ZXing.NotFoundException)) log('⚠ '+err.message,'err');
        }
      );
      log('フォールバック起動完了','ok');
    }catch(e2){
      log('❌ カメラ起動失敗: '+e2.message,'err');
      stop();
    }
  }
}

function stop(){
  if(reader){reader.reset();reader=null;}
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.getElementById('hintBox').style.display='block';
  log('停止しました');
}
</script>
</body>
</html>
