<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1スキャン v11</title>
<style>
  body{font-family:sans-serif;padding:12px;background:#0f172a;color:#e2e8f0;max-width:500px;margin:0 auto}
  h2{color:#4ade80;margin-bottom:4px;font-size:16px}
  p{font-size:11px;color:#64748b;margin-bottom:8px}
  #videoWrap{position:relative;background:#000;border-radius:10px;overflow:hidden;margin-bottom:8px}
  #video{width:100%;display:block;max-height:280px;object-fit:cover}
  .guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75%;height:50px;border:2.5px solid #4ade80;border-radius:4px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55);pointer-events:none}
  .scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f87171,transparent);animation:sl 1.5s ease-in-out infinite}
  @keyframes sl{0%,100%{top:5%}50%{top:88%}}

  button.main{width:100%;padding:13px;margin:4px 0;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-family:sans-serif}
  #startBtn{background:#16a34a;color:#fff}
  #stopBtn{background:#dc2626;color:#fff;display:none}

  .panel{background:#1e293b;border-radius:8px;padding:10px;margin-bottom:8px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .row label{color:#94a3b8;white-space:nowrap;font-size:12px;min-width:70px}
  input[type=range]{flex:1;height:5px;accent-color:#4ade80}
  .val{font-family:monospace;font-size:13px;color:#4ade80;min-width:40px;text-align:right}
  select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:4px 8px;border-radius:6px;font-size:12px;flex:1}

  /* プレビューcanvases */
  .preview-wrap{display:none;gap:4px;margin-bottom:8px}
  .preview-wrap.show{display:grid;grid-template-columns:1fr 1fr}
  .preview-label{font-size:10px;color:#64748b;text-align:center;margin-bottom:2px}
  canvas.preview{width:100%;border-radius:4px;border:1px solid #334155}

  .result-box{background:#1e293b;border-radius:8px;padding:14px;margin:8px 0;font-size:13px;word-break:break-all;min-height:60px;border:1px solid #334155}
  .result-box.success-barcode{border:2px solid #4ade80}
  .result-box.success-ocr{border:2px solid #60a5fa}
  #scanMode{font-size:10px;font-family:monospace;color:#64748b;text-align:center;margin-bottom:4px;min-height:16px}
  #log{background:#020617;border-radius:8px;padding:10px;height:140px;overflow-y:auto;font-family:monospace;font-size:11px;color:#94a3b8;white-space:pre-wrap;word-break:break-all}
  .ok{color:#4ade80}.err{color:#f87171}.info{color:#60a5fa}.warn{color:#fbbf24}

  .toggle-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .toggle{padding:5px 10px;font-size:11px;border:1px solid #334155;background:#0f172a;color:#94a3b8;border-radius:6px;cursor:pointer;font-family:sans-serif}
  .toggle.on{border-color:#4ade80;color:#4ade80;background:#052e16}
</style>
</head>
<body>

<h2>📷 GS1スキャン v11（iPhone/Android対応）</h2>
<p>反転バーコード + OCR（GTIN認識強化版）</p>

<div id="videoWrap">
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <div class="guide" id="guide" style="display:none"><div class="scanline"></div></div>
</div>

<!-- プレビュー -->
<div class="preview-wrap" id="previewWrap">
  <div>
    <div class="preview-label">反転画像（全体）</div>
    <canvas class="preview" id="cvFull"></canvas>
  </div>
  <div>
    <div class="preview-label">切り出し（バーコード領域）</div>
    <canvas class="preview" id="cvCrop"></canvas>
  </div>
</div>

<!-- 設定パネル -->
<div class="panel">
  <div class="row">
    <label>🔍 ズーム</label>
    <input type="range" id="zoomSlider" min="1" max="8" step="0.5" value="4" oninput="applyZoom(this.value)">
    <span class="val" id="zoomVal">×4.0</span>
  </div>
  <div class="row">
    <label>📐 枠サイズ</label>
    <input type="range" id="frameSlider" min="10" max="95" step="5" value="75" oninput="adjustFrame(this.value)">
    <span class="val" id="frameVal">75%</span>
  </div>
  <div class="row">
    <label>⏱ 間隔</label>
    <select id="interval">
      <option value="50">50ms</option>
      <option value="100" selected>100ms</option>
      <option value="200">200ms</option>
    </select>
  </div>
  <div class="row" style="margin-top:2px">
    <label>モード</label>
    <div class="toggle-row">
      <button class="toggle on" id="tog-barcode" onclick="toggleMode('barcode')">バーコード</button>
      <button class="toggle on" id="tog-ocr" onclick="toggleMode('ocr')">OCR★</button>
      <button class="toggle" id="tog-preview" onclick="toggleMode('preview')">プレビュー</button>
    </div>
  </div>
</div>

<div id="scanMode">待機中</div>
<button class="main" id="startBtn" onclick="start()">▶ スキャン開始</button>
<button class="main" id="stopBtn" onclick="stop()">■ 停止</button>

<div class="result-box" id="result" style="color:#64748b">スキャン結果がここに表示されます</div>
<div id="log">待機中...</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<!-- Tesseract.js OCR -->
<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<script>
let stream=null, track=null, scanning=false, frameTimer=null;
let frameWidthPct=0.42;
let modeBarcode=true, modeOcr=true, modePreview=false;
let lastRaw='', lastTime=0, frameCount=0;
let zxingReader=null;
let tesseractWorker=null;
let ocrBusy=false;

const offCanvas=document.createElement('canvas');
const offCtx=offCanvas.getContext('2d',{willReadFrequently:true});
const cropCanvas=document.createElement('canvas');
const cropCtx=cropCanvas.getContext('2d',{willReadFrequently:true});

function log(msg,cls='info'){
  const el=document.getElementById('log');
  const t=new Date().toLocaleTimeString('ja-JP');
  el.innerHTML=`<span class="${cls}">[${t}] ${msg}</span>\n`+el.innerHTML;
}

// ===== GS1解析 =====
function parseGS1(raw){
  const r={gtin:null,expiry:null,lot:null};
  const GS='\u001d';
  if(raw.includes('(')){
    for(const m of raw.matchAll(/\((\d{2,4})\)([^\(\s]*)/g)) applyAI(r,m[1],m[2].trim());
    return r;
  }
  let s=raw.replace(/[\u001e\u00e8]/g,GS);
  if(s.charCodeAt(0)===0x1D) s=s.slice(1);
  let pos=0,g=0;
  while(pos<s.length&&g++<20){
    const a2=s.slice(pos,pos+2),a3=s.slice(pos,pos+3),a4=s.slice(pos,pos+4);
    let ai=a2;
    if(/^31[0-9]$/.test(a3)||/^32[0-9]$/.test(a3)) ai=a3;
    if(/^310[0-9]$/.test(a4)) ai=a4;
    pos+=ai.length;
    const fl={'00':18,'01':14,'02':14,'11':6,'12':6,'13':6,'14':6,'15':6,'16':6,'17':6,'18':6,'19':6,'20':2}[ai]??-1;
    let val;
    if(fl>0){val=s.slice(pos,pos+fl);pos+=fl;}
    else{const gi=s.indexOf(GS,pos);if(gi===-1){val=s.slice(pos);pos=s.length;}else{val=s.slice(pos,gi);pos=gi+1;}}
    applyAI(r,ai,val);
  }
  return r;
}
function applyAI(r,ai,val){
  if(ai==='01') r.gtin=val.replace(/\D/g,'');
  if(ai==='17'&&val.length>=6){
    const yy=parseInt(val.slice(0,2)),mm=parseInt(val.slice(2,4)),dd=parseInt(val.slice(4,6));
    const yyyy=yy+(yy<50?2000:1900);
    const day=dd===0?new Date(yyyy,mm,0).getDate():dd;
    r.expiry=`${yyyy}/${String(mm).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
  }
  if(ai==='10') r.lot=val;
}

// OCRテキストからGS1情報を抽出（v11強化版）
function parseOCRText(text){
  const r={gtin:null,expiry:null,lot:null};

  // ★ OCR生テキストをログに必ず出力
  const rawLog=text.replace(/\n/g,' ').replace(/\s+/g,' ').trim();
  log(`OCR raw: "${rawLog.slice(0,100)}"`, 'info');

  // OCR誤認識補正：O→0、I/l/|→1
  const clean = text
    .replace(/[Oo]/g,'0')
    .replace(/[Il\|]/g,'1')
    .replace(/\s+/g,' ')
    .trim();

  log(`OCR補正後: "${clean.slice(0,100)}"`, 'info');

  // ① 有効期限 AI=17: (17)YYMMDD
  const expM = clean.match(/\(?1[7]\)?[\s:\-]?(\d{6})/);
  if(expM){
    const val=expM[1];
    const yy=parseInt(val.slice(0,2)),mm=parseInt(val.slice(2,4)),dd=parseInt(val.slice(4,6));
    if(mm>=1&&mm<=12){
      const yyyy=yy+(yy<50?2000:1900);
      const day=dd===0?new Date(yyyy,mm,0).getDate():dd;
      r.expiry=`${yyyy}/${String(mm).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
      log(`✅ 期限: ${r.expiry}`,'ok');
    }
  }

  // ② GTIN AI=01: (01)14桁
  // 複数パターンで試みる（OCR誤認識対応）
  const gtinPatterns=[
    /\(?01\)?[\s:\-]?(\d{14})/,           // 正常
    /\(?0[1I]\)?[\s:\-]?(\d{14})/,        // (0I)→(01)
    /\(?[O0][1lI]\)?[\s:\-]?(\d{14})/,   // (O1)(Ol)→(01)
    /01[\s]?(\d{14})/,                     // 括弧なし
    /(\d{14})/,                            // 14桁数字列を直接探す
  ];
  for(const pat of gtinPatterns){
    const m=clean.match(pat);
    if(m){
      const candidate=m[1].replace(/\D/g,'');
      if(candidate.length===14){
        r.gtin=candidate;
        log(`✅ GTIN: ${r.gtin} (パターン: ${pat.source.slice(0,20)})`,'ok');
        break;
      }
    }
  }

  // GTINが13桁だったら先頭に0を補完
  if(!r.gtin){
    const m13=clean.match(/(\d{13})(?!\d)/);
    if(m13){
      r.gtin='0'+m13[1];
      log(`✅ GTIN(13→14): ${r.gtin}`,'warn');
    }
  }

  // GTINが取れなかった場合のフォールバック：10〜16桁の数字列を全て試す
  if(!r.gtin){
    const seqs=[...clean.matchAll(/\d{10,16}/g)].map(m=>m[0]);
    log(`数字列候補: ${seqs.join(', ')}`,'warn');
    for(const seq of seqs){
      if(seq.length>=13&&seq.length<=15){
        r.gtin=seq.padStart(14,'0').slice(0,14);
        log(`GTIN(フォールバック): ${r.gtin}`,'warn');
        break;
      }
    }
  }

  // ③ ロット番号 AI=10
  const lotM=clean.match(/\(?10\)?[\s:\-]?([A-Z0-9]{2,20})(?:\s|$)/i);
  if(lotM&&lotM[1]!==r.gtin){
    r.lot=lotM[1];
    log(`✅ ロット: ${r.lot}`,'ok');
  }

  return r;
}

function showResult(raw, fmt, method){
  const now=Date.now();
  if(raw===lastRaw&&now-lastTime<3000) return;
  lastRaw=raw; lastTime=now;

  const p=fmt==='OCR' ? parseOCRText(raw) : parseGS1(raw);
  const disp=raw.replace(/\u001d/g,'[GS]');
  log(`✅ 読取成功! [${fmt}/${method}]\n   ${disp.slice(0,80)}`,'ok');
  log(`   GTIN:${p.gtin||'—'} 期限:${p.expiry||'—'} ロット:${p.lot||'—'}`,'ok');

  let expColor='#94a3b8',expLabel='';
  if(p.expiry){
    const diff=(new Date(p.expiry.replace(/\//g,'-'))-new Date())/86400000;
    if(diff<0){expColor='#f87171';expLabel=` ⚠️ 期限切れ`;}
    else if(diff<=90){expColor='#f87171';expLabel=` ⚠️ 残り${Math.floor(diff)}日`;}
    else if(diff<=365){expColor='#fbbf24';expLabel=` 残り約${Math.floor(diff/30)}ヶ月`;}
    else{expColor='#4ade80';expLabel=` 残り約${Math.floor(diff/365)}年`;}
  }

  const isOCR=fmt==='OCR';
  const el=document.getElementById('result');
  el.className=`result-box ${isOCR?'success-ocr':'success-barcode'}`;
  el.innerHTML=
    `<div style="color:${isOCR?'#60a5fa':'#4ade80'};font-size:15px;font-weight:bold;margin-bottom:8px">`+
    `✅ 読み取り成功！<span style="font-size:11px">(${isOCR?'OCR':'バーコード'})</span></div>`+
    `<div><span style="color:#64748b;font-size:11px">GTIN：</span><span style="font-family:monospace">${p.gtin||'—'}</span></div>`+
    `<div><span style="color:#64748b;font-size:11px">有効期限：</span><span style="font-family:monospace;color:${expColor}">${p.expiry||'—'}${expLabel}</span></div>`+
    `<div><span style="color:#64748b;font-size:11px">ロット：</span><span style="font-family:monospace">${p.lot||'—'}</span></div>`+
    `<div style="font-size:10px;color:#475569;margin-top:6px">RAW: ${disp.slice(0,100)}</div>`;
}

// ===== フレーム解析 =====
async function analyzeFrame(){
  if(!scanning) return;
  const video=document.getElementById('video');
  if(video.readyState<video.HAVE_ENOUGH_DATA){scheduleNext();return;}

  const W=video.videoWidth||1280;
  const H=video.videoHeight||720;
  offCanvas.width=W; offCanvas.height=H;
  offCtx.drawImage(video,0,0,W,H);

  // ★ 反転処理
  const imageData=offCtx.getImageData(0,0,W,H);
  const data=imageData.data;
  const inv=new Uint8ClampedArray(data.length);
  for(let i=0;i<data.length;i+=4){
    inv[i]=255-data[i]; inv[i+1]=255-data[i+1]; inv[i+2]=255-data[i+2]; inv[i+3]=255;
  }

  // ★ バーコードラベル2.8cm×1.5cm（画面中央の小さな枠）に合わせた切り出し
  const cy=Math.floor(H*0.35);
  const ch=Math.floor(H*0.30);
  const cropW=Math.floor(W*0.75);
  const cropX=Math.floor(W*0.125);

  cropCanvas.width=cropW; cropCanvas.height=ch;
  // 反転画像から中央帯を切り出す
  const cropData=new Uint8ClampedArray(cropW*ch*4);
  for(let y=0;y<ch;y++){
    for(let x=0;x<cropW;x++){
      const si=((cy+y)*W+(cropX+x))*4;
      const di=(y*cropW+x)*4;
      cropData[di]=inv[si]; cropData[di+1]=inv[si+1]; cropData[di+2]=inv[si+2]; cropData[di+3]=255;
    }
  }

  // プレビュー表示
  if(modePreview){
    const fc=document.getElementById('cvFull');
    fc.width=W; fc.height=H;
    fc.getContext('2d').putImageData(new ImageData(inv,W,H),0,0);
    const cc=document.getElementById('cvCrop');
    cc.width=cropW; cc.height=ch;
    cc.getContext('2d').putImageData(new ImageData(cropData,cropW,ch),0,0);
  }

  frameCount++;

  // ① バーコード解析（反転全体 + 切り出し）
  if(modeBarcode&&frameCount%2===0){
    document.getElementById('scanMode').textContent=`🔲 バーコード解析中 (${frameCount})`;
    // 全体で試行
    await tryZXing(inv,W,H,'全体');
    // 切り出しで試行
    await tryZXing(cropData,cropW,ch,'切出');
  }

  // ② OCR解析（切り出し領域を使用）
  if(modeOcr&&frameCount%4===0&&!ocrBusy){
    document.getElementById('scanMode').textContent=`📝 OCR解析中 (${frameCount})`;
    ocrBusy=true;
    await tryOCR(cropData,cropW,ch);
    ocrBusy=false;
  }

  scheduleNext();
}

async function tryZXing(pixelData,W,H,label){
  try{
    const lum=new ZXing.RGBLuminanceSource(pixelData,W,H);
    const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
    const result=zxingReader.decode(bmp);
    if(result) showResult(result.getText(),result.getBarcodeFormat().toString(),label);
  } catch(e){}
  // 90度回転して再試行
  try{
    const lum=new ZXing.RGBLuminanceSource(pixelData,W,H);
    const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
    const rot=bmp.rotateCounterClockwise();
    const result=zxingReader.decode(rot);
    if(result) showResult(result.getText(),result.getBarcodeFormat().toString(),label+'回転');
  } catch(e){}
}

async function tryOCR(pixelData,W,H){
  if(!tesseractWorker) return;
  try{
    // cropCanvasを使ってTesseractに渡す
    const tc=document.createElement('canvas');
    tc.width=W; tc.height=H;
    tc.getContext('2d').putImageData(new ImageData(pixelData,W,H),0,0);
    const {data:{text}}=await tesseractWorker.recognize(tc);
    const clean=text.replace(/\s+/g,' ').trim();
    if(clean.length>3){
      log(`OCR raw: "${clean.slice(0,80)}"`, 'info');
      const p=parseOCRText(clean);
      // GTIN または 有効期限 のどちらか一方でも取れれば表示
      if(p.gtin||p.expiry){
        const summary=`GTIN:${p.gtin||'—'} 期限:${p.expiry||'—'} ロット:${p.lot||'—'}`;
        showResult(clean,'OCR','tesseract');
      }
    }
  } catch(e){
    log('OCRエラー: '+e.message,'err');
  }
}

function scheduleNext(){
  if(!scanning) return;
  frameTimer=setTimeout(analyzeFrame,parseInt(document.getElementById('interval').value));
}

// ===== カメラ起動 =====
async function start(){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('guide').style.display='block';
  log('初期化中...');

  // ZXing
  const hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.RSS_EXPANDED,
    ZXing.BarcodeFormat.RSS_EXPANDED_STACKED,
    ZXing.BarcodeFormat.RSS_14,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.QR_CODE,
  ]);
  hints.set(ZXing.DecodeHintType.ASSUME_GS1,true);
  hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
  zxingReader=new ZXing.MultiFormatReader();
  zxingReader.setHints(hints);
  log('ZXing初期化完了','ok');

  // Tesseract OCR初期化
  if(modeOcr){
    log('Tesseract OCR初期化中（初回のみ時間がかかります）...');
    try{
      tesseractWorker=await Tesseract.createWorker('eng',1,{
        logger: m => { if(m.status==='recognizing text') log(`OCR: ${Math.round(m.progress*100)}%`,'info'); }
      });
      // 英数字・記号のみ・PSMを設定（医薬品コード向け）
      await tesseractWorker.setParameters({
        tessedit_char_whitelist:'0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz()-.',
        tessedit_pageseg_mode: '6', // 均一なテキストブロックとして認識
        preserve_interword_spaces: '1',
      });
      log('Tesseract OCR初期化完了','ok');
    } catch(e){
      log('OCR初期化失敗（バーコードモードのみ使用）: '+e.message,'warn');
      tesseractWorker=null;
    }
  }

  // カメラ起動
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920,min:1280},
        height:{ideal:1080,min:720},
        focusMode:{ideal:'continuous'},
        exposureMode:{ideal:'continuous'},
      }
    });
    track=stream.getVideoTracks()[0];
    const s=track.getSettings();
    log(`解像度: ${s.width}×${s.height}`,'ok');

    const caps=track.getCapabilities?.()??{};
    if(caps.zoom){
      document.getElementById('zoomSlider').max=Math.min(caps.zoom.max,8);
      log(`ハードウェアズーム対応: ×〜${caps.zoom.max.toFixed(1)}`,'ok');
    }

    const video=document.getElementById('video');
    video.srcObject=stream;
    await video.play();

    // 起動時にズーム×4を適用
    await applyZoom(4);

    log('カメラ起動完了 ✅','ok');
    log('黒いバーコードラベルを枠に合わせてください','warn');
    log('枠サイズとズームスライダーで調整できます','info');
    scanning=true;
    analyzeFrame();
  } catch(e){
    log('❌ カメラエラー: '+e.message,'err');
    stop();
  }
}

async function stop(){
  scanning=false;
  clearTimeout(frameTimer);
  if(tesseractWorker){await tesseractWorker.terminate();tesseractWorker=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  track=null; zxingReader=null;
  const video=document.getElementById('video');
  video.style.transform=''; video.srcObject=null;
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('guide').style.display='none';
  document.getElementById('previewWrap').className='preview-wrap';
  document.getElementById('scanMode').textContent='停止';
  log('停止しました');
}

function adjustFrame(val){
  val=parseInt(val);
  document.getElementById('frameVal').textContent=val+'%';
  document.getElementById('guide').style.width=val+'%';
  // 切り出し領域も連動
  frameWidthPct=val/100;
  log(`枠サイズ: ${val}%`,'info');
}

async function applyZoom(val){
  val=parseFloat(val);
  document.getElementById('zoomSlider').value=val;
  document.getElementById('zoomVal').textContent=`×${val.toFixed(1)}`;
  if(!track) return;
  try{
    await track.applyConstraints({advanced:[{zoom:val}]});
    log(`ズーム ×${val}`,'ok');
  } catch(e){
    document.getElementById('video').style.transform=`scale(${val})`;
    document.getElementById('video').style.transformOrigin='center center';
  }
}

function toggleMode(mode){
  if(mode==='barcode'){
    modeBarcode=!modeBarcode;
    document.getElementById('tog-barcode').className='toggle'+(modeBarcode?' on':'');
  } else if(mode==='ocr'){
    modeOcr=!modeOcr;
    document.getElementById('tog-ocr').className='toggle'+(modeOcr?' on':'');
  } else if(mode==='preview'){
    modePreview=!modePreview;
    document.getElementById('tog-preview').className='toggle'+(modePreview?' on':'');
    document.getElementById('previewWrap').className='preview-wrap'+(modePreview?' show':'');
  }
  log(`モード変更: barcode=${modeBarcode} ocr=${modeOcr} preview=${modePreview}`,'info');
}
</script>
</body>
</html>
