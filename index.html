<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1スキャンテスト v2</title>
<style>
  body{font-family:sans-serif;padding:16px;background:#f5f4f0;max-width:600px;margin:0 auto}
  h2{font-size:16px;margin-bottom:12px;color:#2d5a3d}
  #reader{width:100%;border-radius:10px;overflow:hidden;margin-bottom:14px;background:#000;min-height:200px}
  .card{background:#fff;border-radius:10px;border:1px solid #e2e0d8;padding:16px;margin-bottom:12px}
  .label{font-size:10px;color:#9e9b93;text-transform:uppercase;letter-spacing:0.05em}
  .val{font-size:18px;font-weight:700;font-family:monospace;margin-top:2px}
  .val.ok{color:#2d5a3d}.val.danger{color:#c0392b}.val.warn{color:#b7621a}
  .raw{font-size:11px;font-family:monospace;color:#6b6860;word-break:break-all;margin-top:8px;padding:8px;background:#f0efe9;border-radius:6px}
  .status{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;line-height:1.6}
  .status.scanning{background:#e8f2eb;color:#2d5a3d}
  .status.error{background:#fdf0ee;color:#c0392b}
  .status.idle{background:#f0efe9;color:#6b6860}
  button{padding:12px 20px;background:#2d5a3d;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;width:100%;margin-bottom:8px;font-family:sans-serif}
  button:active{opacity:0.8}
  button.stop{background:#c0392b}
  button.add{background:#1a4a8a}
  #log{font-size:11px;font-family:monospace;color:#6b6860;max-height:150px;overflow-y:auto;padding:8px;background:#f0efe9;border-radius:6px;white-space:pre-wrap;word-break:break-all}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{padding:6px 8px;text-align:left;border-bottom:1px solid #e2e0d8;background:#f0efe9;font-size:11px}
  td{padding:6px 8px;border-bottom:1px solid #e2e0d8}
</style>
</head>
<body>

<h2>📷 GS1-128スキャンテスト v2</h2>

<div id="reader"></div>

<div class="status idle" id="status">スタートボタンを押してください</div>

<button id="startBtn" onclick="startScan()">📷 スキャン開始</button>
<button id="stopBtn" class="stop" onclick="stopScan()" style="display:none">■ 停止</button>

<div class="card" id="resultCard" style="display:none">
  <div class="label">GTIN（商品コード）</div>
  <div class="val" id="rGtin">—</div>
  <div class="label" style="margin-top:10px">有効期限</div>
  <div class="val" id="rExp">—</div>
  <div class="label" style="margin-top:10px">ロット番号</div>
  <div class="val" id="rLot" style="font-size:14px">—</div>
  <div class="label" style="margin-top:10px">錠数（手入力）</div>
  <input type="number" id="rQty" style="width:100%;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:6px;margin-top:4px" placeholder="錠数を入力">
  <button class="add" onclick="addToList()" style="margin-top:10px">チェックリストに追加 →</button>
  <div class="raw" id="rRaw"></div>
</div>

<div class="card" id="listCard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <strong style="font-size:13px">在庫チェックリスト</strong>
    <button onclick="exportCSV()" style="width:auto;padding:6px 14px;font-size:12px">CSV保存</button>
  </div>
  <table>
    <thead><tr><th>GTIN</th><th>有効期限</th><th>ロット</th><th style="text-align:right">数量</th></tr></thead>
    <tbody id="listBody"></tbody>
  </table>
</div>

<div class="card">
  <div style="font-size:12px;font-weight:700;margin-bottom:6px">🔍 デバッグログ</div>
  <div id="log">ログ待機中...</div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
let scanner = null;
let checklist = [];
let lastRaw = '';
let lastTime = 0;

// ===== GS1-128 解析 =====
function parseGS1(raw) {
  const r = { gtin:null, expiry:null, expiryDate:null, lot:null, raw };
  const GS = '\u001d';

  // カッコ付きフォーマット: (01)xxx (17)xxx (10)xxx
  if (raw.includes('(')) {
    for (const m of raw.matchAll(/\((\d{2,4})\)([^\(]*)/g)) {
      applyAI(r, m[1], m[2].trim().replace(/\s/g,''));
    }
    return r;
  }

  // 生GS1-128（FNC1 = GS文字区切り）
  let s = raw.replace(/[\u001e\u00e8]/g, GS);
  if (s.charCodeAt(0) === 0x1D) s = s.slice(1);

  let pos = 0;
  let safety = 0;
  while (pos < s.length && safety++ < 20) {
    // AI候補を試みる（2〜4桁）
    const ai2 = s.slice(pos, pos+2);
    const ai3 = s.slice(pos, pos+3);
    const ai4 = s.slice(pos, pos+4);
    let ai = ai2;
    if (['310','311','312','313','314','315','316',
         '320','321','322','323','324','325','326','327','328','329'].includes(ai3)) ai = ai3;
    else if (/^\d{4}$/.test(ai4) &&
      ['3100','3101','3102','3103','3104','3105',
       '3200','3201','3202','3203','3204','3205'].includes(ai4)) ai = ai4;

    pos += ai.length;
    const fixLen = fixedLength(ai);
    let val;
    if (fixLen > 0) {
      val = s.slice(pos, pos + fixLen);
      pos += fixLen;
    } else {
      const gsIdx = s.indexOf(GS, pos);
      if (gsIdx === -1) { val = s.slice(pos); pos = s.length; }
      else { val = s.slice(pos, gsIdx); pos = gsIdx + 1; }
    }
    applyAI(r, ai, val);
  }
  return r;
}

function fixedLength(ai) {
  const tbl = {'00':18,'01':14,'02':14,'11':6,'12':6,'13':6,'14':6,'15':6,'16':6,'17':6,'18':6,'19':6,'20':2};
  if (tbl[ai] !== undefined) return tbl[ai];
  if (/^3[1-6]\d$/.test(ai) || /^3[1-6]\d\d$/.test(ai)) return 6;
  return -1;
}

function applyAI(r, ai, val) {
  if (ai === '01') r.gtin = val.replace(/\D/g,'');
  if (ai === '17' && val.length >= 6) {
    const yy=parseInt(val.slice(0,2)), mm=parseInt(val.slice(2,4)), dd=parseInt(val.slice(4,6));
    const yyyy = yy + (yy < 50 ? 2000 : 1900);
    const day = dd === 0 ? new Date(yyyy, mm, 0).getDate() : dd;
    r.expiryDate = new Date(yyyy, mm-1, day);
    r.expiry = `${yyyy}/${String(mm).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
  }
  if (ai === '10') r.lot = val;
}

function expLabel(d) {
  if (!d) return { cls:'', txt:'期限情報なし' };
  const diff = (d - new Date()) / 86400000;
  if (diff < 0) return { cls:'danger', txt:`期限切れ（${Math.abs(Math.floor(diff))}日経過）` };
  if (diff <= 90) return { cls:'danger', txt:`残り${Math.floor(diff)}日 ⚠️` };
  if (diff <= 365) return { cls:'warn', txt:`残り約${Math.floor(diff/30)}ヶ月` };
  return { cls:'ok', txt:`残り約${Math.floor(diff/365)}年${Math.floor((diff%365)/30)}ヶ月` };
}

// ===== スキャン =====
function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.textContent = `[${t}] ${msg}\n` + el.textContent;
}

function setStatus(msg, cls='idle') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

async function startScan() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  setStatus('カメラを起動中...', 'scanning');

  scanner = new Html5Qrcode('reader');

  // iPhone Safari向け：qrboxなし・シンプル設定
  const config = {
    fps: 10,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417,
    ]
  };

  try {
    await scanner.start(
      { facingMode: 'environment' },
      config,
      onSuccess,
      (err) => { /* 読み取り失敗は無視 */ }
    );
    setStatus('📷 スキャン中… バーコードをカメラに向けてください\n（バーコードから15〜20cm離すと読みやすいです）', 'scanning');
    log('スキャン開始');
  } catch(e) {
    setStatus(`❌ カメラエラー: ${e}`, 'error');
    log('エラー: ' + e);
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
  }
}

async function stopScan() {
  if (scanner) { try { await scanner.stop(); } catch(e){} scanner = null; }
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  setStatus('停止しました');
  log('スキャン停止');
}

function onSuccess(rawValue) {
  const now = Date.now();
  if (rawValue === lastRaw && now - lastTime < 3000) return;
  lastRaw = rawValue; lastTime = now;

  const display = rawValue.replace(/\u001d/g,'[GS]');
  log('読取: ' + display);

  const parsed = parseGS1(rawValue);
  const exp = expLabel(parsed.expiryDate);

  document.getElementById('rGtin').textContent = parsed.gtin || '（取得不可）';
  document.getElementById('rExp').textContent = parsed.expiry || '（情報なし）';
  document.getElementById('rExp').className = 'val ' + exp.cls;
  document.getElementById('rLot').textContent = parsed.lot || '（情報なし）';
  document.getElementById('rRaw').textContent = `RAW: ${display}\n状態: ${exp.txt}`;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('rQty').value = '';
}

// ===== チェックリスト =====
function addToList() {
  const item = {
    gtin: document.getElementById('rGtin').textContent,
    exp: document.getElementById('rExp').textContent,
    lot: document.getElementById('rLot').textContent,
    qty: document.getElementById('rQty').value || '未入力',
    time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})
  };
  checklist.push(item);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="font-family:monospace;font-size:11px">${item.gtin}</td>
    <td style="font-family:monospace">${item.exp}</td>
    <td style="font-family:monospace;font-size:11px">${item.lot}</td>
    <td style="text-align:right;font-weight:700">${item.qty}</td>`;
  document.getElementById('listBody').appendChild(tr);
  document.getElementById('listCard').style.display = 'block';
  log(`リスト追加: ${item.gtin} 期限:${item.exp} 数量:${item.qty}`);
}

function exportCSV() {
  if (!checklist.length) return;
  const csv = '\uFEFF' + 'GTIN,有効期限,ロット番号,数量,記録時刻\n' +
    checklist.map(r=>`"${r.gtin}","${r.exp}","${r.lot}","${r.qty}","${r.time}"`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `在庫チェック_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
